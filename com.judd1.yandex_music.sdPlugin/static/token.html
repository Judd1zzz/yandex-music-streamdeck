<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Настройка токена Яндекс Музыки</title>
    <link rel="stylesheet" href="css/token.css">
</head>
<body>
    <div class="card">
        <h2>Аутентификация</h2>

        <input type="text" id="token" placeholder="Вставьте токен сюда..." autocomplete="off">

        <div id="status_msg" class="status-msg"></div>
        <button id="saveBtn" onclick="save()">Обновить токен</button>
    </div>

    <div class="footer">Для проверки токена нужен запущенный локальный API-сервер (api_for_plugin)</div>

    <script src="js/token.js"></script>
</body>
</html>
